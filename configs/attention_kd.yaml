experiment:
  name: attention_kd

teacher:
  model: vit_large_patch16_224
  embed_dim: 1024

student:
  model: vit_tiny_patch16_224
  embed_dim: 192

training:
  batch_size: 16
  epochs: 10
  lr: 0.0001
  subset_size: 1000
  seed: 42

distillation:
  type: attention_kd
  temperature: 4.0
  alpha: 0.7
  
feature_kd:
  enabled: true
  teacher_layers: [5, 11, 17, 23]
  student_layers: [2, 5, 8, 11]
  lambda_kd: 1.0
  lambda_feature: 1.0
  distill_cls: true
  distill_patch: true
  
attention_kd:
  enabled: true
  lambda_attn: 0.5
  average_heads: true
